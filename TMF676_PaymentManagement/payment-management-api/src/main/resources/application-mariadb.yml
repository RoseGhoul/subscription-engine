spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/jio_payment?createDatabaseIfNotExist=true&disableSslHostnameVerification=true
    username: root
    password: mariadb
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
