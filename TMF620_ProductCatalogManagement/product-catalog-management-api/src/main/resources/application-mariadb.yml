spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/jio_product_catalog?createDatabaseIfNotExist=true&disableSslHostnameVerification=true
    username: root
    password: mariadb
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: false

logging:
  level:
    root: INFO
    com.subscriptionengine: INFO
