server:
  port: 8088
  servlet:
    context-path: /tmf-api

spring:
  application:
    name: quote-management-service
  datasource:
    url: jdbc:h2:mem:quotedb
    driverClassName: org.h2.Driver
    username: sa
    password: mariadb
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.web: INFO
    com.subscriptionengine.paymentmethod: DEBUG
