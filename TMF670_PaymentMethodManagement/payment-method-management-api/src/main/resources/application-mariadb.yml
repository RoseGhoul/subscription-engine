spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/jio_payment_method?createDatabaseIfNotExist=true
    username: root
    password: mariadb
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MariaDBDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

flyway:
  enabled: true
  baseline-on-migrate: true
  locations: classpath:db/migration
